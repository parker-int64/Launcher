name: Build APPLauncher

on:
  push:
    branches: [master, ci/**]
    paths:
      - 'projects/APPLaunch/**'
      - 'projects/AppStore'
      - 'projects/AppStore/**'
      - 'projects/Calculator'
      - 'projects/Calculator/**'
      - 'projects/LaunchWizard/**'
      - 'projects/ZClaw/**'
      - 'SDK/**'
      - 'ext_components/**'
      - '.gitmodules'
      - '.github/workflows/launcher-build.yml'
      - 'scripts/debian_packager.py'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.7.0 or v0.7.0); leave empty to increment the latest release patch"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: launcher-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve release version
      id: version
      shell: bash
      env:
        REQUESTED_VERSION: ${{ github.event.inputs.version || '' }}
      run: |
        set -euo pipefail

        version="${REQUESTED_VERSION#v}"
        if [[ -z "${version}" ]]; then
          baseline="$(sed -nE 's/^DEFAULT_VERSION = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/p' scripts/debian_packager.py | head -n1)"
          latest="$({
            printf '%s\n' "${baseline}"
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq \
              '.[].tag_name | select(test("^launcher-v[0-9]+\\.[0-9]+\\.[0-9]+$"))' 2>/dev/null \
              | sed -E 's/^launcher-v//'
          } | sed '/^$/d' | sort -V | tail -n1)"
          if [[ ! "${latest}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Unable to determine a semantic version from releases or packager default: ${latest:-<none>}" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
        fi

        if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Version must use MAJOR.MINOR.PATCH format, got: ${version}" >&2
          exit 1
        fi

        tag="launcher-v${version}"
        if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
          echo "Tag ${tag} already exists; choose a different manual version." >&2
          exit 1
        fi

        echo "version=${version}" >> "${GITHUB_OUTPUT}"
        echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
        echo "Building APPLauncher ${version}"

    - name: Initialize submodules (SDK + AppStore + Calculator)
      run: |
        git submodule update --init --depth=1 SDK
        git submodule update --init --depth=1 projects/AppStore
        git submodule update --init --depth=1 projects/Calculator

    - name: Install cross-compilation toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu dpkg-dev \
          libfreetype-dev libpng-dev

    - name: Install Python build dependencies
      run: pip install scons parse requests tqdm

    - name: Extract SDK BSP version
      id: sdk-version
      run: |
        VER=$(grep '^version' projects/APPLaunch/SConstruct | head -1 | sed 's/.*"\(.*\)"/\1/')
        echo "ver=$VER" >> "$GITHUB_OUTPUT"
        echo "SDK BSP version: $VER"

    - name: Cache SDK BSP static_lib
      uses: actions/cache@v4
      with:
        path: SDK/github_source/static_lib_${{ steps.sdk-version.outputs.ver }}
        key: sdk-bsp-${{ steps.sdk-version.outputs.ver }}

    - name: Pre-download C-Thread-Pool (avoid flaky GitHub archive fetch during scons)
      run: |
        DEST=SDK/github_source/C-Thread-Pool
        if [ ! -d "$DEST" ]; then
          for i in 1 2 3; do
            curl -fsSL -o /tmp/ctp.zip "https://github.com/Pithikos/C-Thread-Pool/archive/refs/heads/master.zip" && break
            echo "retry $i..."; sleep 5
          done
          unzip -q /tmp/ctp.zip -d /tmp/ctp
          mv /tmp/ctp/C-Thread-Pool-master "$DEST"
        fi
        ls "$DEST/thpool.c" && echo "C-Thread-Pool ready"

    - name: Build APPLauncher (cross-compile aarch64)
      run: |
        cd projects/APPLaunch
        rm -rf build dist
        export CardputerZero=y
        export CONFIG_REPO_AUTOMATION=y
        scons -j$(nproc)

    - name: Build AppStore (cross-compile aarch64)
      run: |
        cd projects/AppStore
        rm -rf build dist
        export CardputerZero=y
        export CONFIG_REPO_AUTOMATION=y
        scons -j$(nproc)

    - name: Build Calculator (cross-compile aarch64)
      run: |
        cd projects/Calculator
        rm -rf build dist
        export CardputerZero=y
        export CONFIG_REPO_AUTOMATION=y
        scons -j$(nproc)

    - name: Build LaunchWizard (cross-compile aarch64)
      run: |
        cd projects/LaunchWizard
        rm -rf build dist
        export CardputerZero=y
        export CONFIG_REPO_AUTOMATION=y
        scons -j$(nproc)

    - name: Build ZClaw (cross-compile aarch64)
      run: |
        cd projects/ZClaw
        rm -rf build dist
        export CardputerZero=y
        export CONFIG_REPO_AUTOMATION=y
        scons -j$(nproc)

    - name: Copy bundled apps into APPLaunch dist
      run: |
        mkdir -p projects/APPLaunch/dist/bin
        cp projects/AppStore/dist/M5CardputerZero-AppStore projects/APPLaunch/dist/bin/
        cp projects/AppStore/dist/APPLaunch/bin/appstore.py projects/APPLaunch/dist/bin/
        cp projects/Calculator/dist/M5CardputerZero-Calculator projects/APPLaunch/dist/bin/
        cp projects/ZClaw/dist/ZClaw projects/APPLaunch/dist/bin/
        mkdir -p projects/APPLaunch/dist/APPLaunch/applications
        cp projects/ZClaw/dist/APPLaunch/applications/zclaw.desktop projects/APPLaunch/dist/APPLaunch/applications/
        mkdir -p projects/APPLaunch/dist/APPLaunch/share/images
        cp projects/AppStore/dist/APPLaunch/share/images/store_wordmark.png projects/APPLaunch/dist/APPLaunch/share/images/ 2>/dev/null || true
        cp projects/AppStore/dist/APPLaunch/share/images/store_arrow_*.png projects/APPLaunch/dist/APPLaunch/share/images/ 2>/dev/null || true

    - name: Bundle LaunchWizard into APPLaunch package tree
      run: |
        mkdir -p projects/APPLaunch/APPLaunch/bin
        cp projects/LaunchWizard/dist/LaunchWizard projects/APPLaunch/APPLaunch/bin/LaunchWizard
        chmod 0755 projects/APPLaunch/APPLaunch/bin/LaunchWizard

    - name: Build .deb package
      run: |
        python3 scripts/debian_packager.py --version "${{ steps.version.outputs.version }}"

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        cp projects/APPLaunch/dist/M5CardputerZero-APPLaunch artifacts/
        cp projects/APPLaunch/tools/*.deb artifacts/

    - uses: actions/upload-artifact@v4
      with:
        name: applaunch-arm64
        path: artifacts/

  prerelease:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/ci/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: applaunch-arm64
        path: artifacts/

    - name: Create prerelease
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.tag }}
        name: "APPLauncher Prerelease v${{ needs.build.outputs.version }}"
        prerelease: true
        generate_release_notes: true
        files: |
          artifacts/*.deb
          artifacts/M5CardputerZero-APPLaunch
